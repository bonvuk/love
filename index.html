<head>

<title>✦ Ngôi Sao Tình Yêu Của Em ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">

<style>
/* ──────────────────────────────────────────
   RESET & BASE
────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --rose-gold: #E8A86A;
  --rose-hi:   #FFC8A0;
  --rose-lo:   #B8782A;
  --cream:     #F2E8D8;
  --mist:      #A89CC0;
  --void:      #020308;
  --deep:      #1C0709; 
  --mid:       #300C10; 
}

html, body {
  width:100%; 
  height: 100%;
  height: -webkit-fill-available;
  background: var(--void);
  color: var(--cream);
  font-family: 'Cormorant Garamond', Georgia, serif;
  overflow: hidden;
  user-select: none;
}

/* ──────────────────────────────────────────
   PASSWORD SCREEN
────────────────────────────────────────── */
#pw-screen {
  position: fixed; inset:0; z-index:200;
  display: flex; align-items:center; justify-content:center;
  background: radial-gradient(ellipse at 50% 60%, var(--mid) 0%, var(--void) 70%);
  transition: opacity 1.2s ease;
}
#pw-screen.fade-out { opacity:0; pointer-events:none; }

#pw-bg { position:absolute; inset:0; overflow:hidden; }
.sp {
  position:absolute; border-radius:50%; background:#fff;
  animation: tw var(--d) ease-in-out infinite;
  animation-delay: var(--dl);
}
@keyframes tw {
  0%,100% { opacity: var(--a); transform:scale(1); }
  50%      { opacity:1;        transform:scale(1.4); }
}

.pw-card {
  position: relative; z-index:1;
  width: min(460px, 92vw);
  padding: 56px 52px 48px;
  background: rgba(255,255,255,0.015);
  border: 1px solid rgba(232,168,106,0.12);
  border-radius: 2px;
  backdrop-filter: blur(18px);
  box-shadow: 0 0 80px rgba(0,0,0,0.8);
  text-align: center;
}

.star-icon {
  display: inline-block;
  animation: heartbeat 1.4s infinite;
  filter: drop-shadow(0 0 18px rgba(255,120,180,.9));
  font-size: 40px; color: var(--rose-gold);
  margin-bottom: 24px;
  line-height:1;
}

.pw-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(17px, 4vw, 22px);
  color: var(--rose-gold);
  letter-spacing: .08em;
  line-height: 1.45;
  margin-bottom: 12px;
}
.pw-sub {
  font-style:italic; font-size:15px;
  color: var(--mist); line-height:1.7;
  margin-bottom: 44px;
}

.pw-input {
  width:100%; background:transparent; border:none;
  border-bottom: 1px solid rgba(232,168,106,.35);
  padding: 10px 6px 10px; text-align:center;
  font-family:'Cormorant Garamond',serif; font-size:22px;
  letter-spacing:.35em; color:var(--cream); outline:none;
  transition: border-color .3s;
  margin-bottom: 36px;
}
.pw-input:focus       { border-bottom-color: var(--rose-gold); }
.pw-input::placeholder{ color:rgba(168,156,192,.45); letter-spacing:.12em; font-style:italic; font-size:14px; }

.pw-btn {
  width:100%; padding:14px 20px; background:transparent; cursor:pointer;
  border: 1px solid var(--rose-lo); color: var(--rose-gold);
  font-family:'Cinzel Decorative',serif; font-size:12px;
  letter-spacing:.25em; transition: all .4s; position:relative; overflow:hidden;
}
.pw-btn::after {
  content:''; position:absolute; inset:0; background:var(--rose-gold);
  transform:scaleX(0); transform-origin:left; transition:transform .4s ease; z-index:-1;
}
.pw-btn:hover::after { transform:scaleX(1); }
.pw-btn:hover { color:var(--void); border-color:var(--rose-gold); }

.pw-err {
  margin-top:18px; font-style:italic; font-size:13.5px;
  color:#E07070; opacity:0; transition:opacity .3s;
}
.pw-err.show { opacity:1; }

@keyframes heartbeat{
  0%,100%{transform:scale(1)}
  15%{transform:scale(1.15)}
  30%{transform:scale(1)}
  45%{transform:scale(1.22)}
  60%{transform:scale(1)}
}

@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%,60%{transform:translateX(-9px)}
  40%,80%{transform:translateX(9px)}
}
.do-shake { animation: shake .38s ease !important; }

/* ──────────────────────────────────────────
   STAR SCREEN & INFOBAR (TỐI ƯU SIÊU GỌN)
────────────────────────────────────────── */
#star-screen {
  position: fixed; inset:0; z-index:10;
  opacity:0; transition:opacity 1.8s ease;
  pointer-events:none;
}
#star-screen.show { opacity:1; pointer-events:all; }

#canvas { display:block; width:100%; height:100%; }

#star-screen::before {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:1;
  background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(2,3,8,.6) 100%);
}

.top-tag {
  position:absolute; top:24px; left:50%; transform:translateX(-50%);
  z-index:5; text-align:center;
  font-size:10px; letter-spacing:.5em; text-transform:uppercase;
  color:rgba(232,168,106,.4);
  text-shadow: 0 2px 4px rgba(0,0,0,0.8);
  opacity:0; animation: rise 1s ease forwards; animation-delay:2s;
}

/* Thu nhỏ chiều cao và padding tổng thể */
.info-bar {
  position:absolute; bottom:0; left:0; right:0; z-index:5;
  padding: 24px 44px 28px;
  background: linear-gradient(to top, rgba(2,3,8,0.95) 0%, rgba(2,3,8,0.7) 70%, transparent 100%);
  display:flex; align-items:flex-end; justify-content:space-between; gap:40px;
  max-height: 40vh;
  overflow-y: auto !important;
  scrollbar-width: none !important;
}
.info-bar::-webkit-scrollbar { display: none !important; }

.star-left { 
  flex: 1.3; min-width:280px; 
  text-shadow: 0 2px 6px rgba(0,0,0,0.9);
}
.star-right { 
  flex: 0.9; min-width:240px; max-width: 320px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.9);
  text-align: right;
}

.star-astronomy-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--rose-gold);
  opacity: 0.75;
  margin-bottom: 2px;
  text-transform: uppercase;
}

.girl-name-big {
  font-family:'Cinzel Decorative',serif;
  font-size: clamp(24px, 4vw, 44px); 
  color: #FFFFFF; 
  line-height:1.2; margin-bottom:6px;
  text-shadow: 0 0 15px rgba(255,210,180,0.4), 0 2px 4px rgba(0,0,0,0.6); 
  letter-spacing: 0.05em;
}

.star-meaning {
  font-style:italic; font-size:15px;
  color:var(--mist); margin-bottom:12px;
}
.star-msg {
  font-size:14px; font-style:italic;
  color:rgba(242,232,216,.8); line-height:1.7;
  max-width:540px;
}

.coord-head {
  font-size:10px; letter-spacing:.3em; text-transform:uppercase;
  color:rgba(232,168,106,.6); margin-bottom:10px;
}
.coord-row {
  display:flex; justify-content:space-between; gap:16px;
  margin-bottom:5px; font-size:13px;
}
.ck { color:var(--mist); font-style:italic; }
.cv { color:var(--cream); font-weight:300; letter-spacing:.02em; }
.divider {
  width:30px; height:1px; margin:12px 0 12px auto;
  background:linear-gradient(to right, transparent, var(--rose-lo));
}

@keyframes rise {
  from{opacity:0;transform:translate(-50%,8px)}
  to{opacity:1;transform:translate(-50%,0)}
}
@keyframes fadeUp {
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
.star-left  { opacity:0; animation: fadeUp 1.1s ease forwards; animation-delay:1.6s; }
.star-right { opacity:0; animation: fadeUp 1.1s ease forwards; animation-delay:1.9s; }

.star-left, .star-right { min-width:0; overflow:hidden; }
.girl-name-big, .star-msg { word-break:break-word; }

/* ──────────────────────────────────────────
   RESPONSIVE (MOBILE SIÊU GỌN CHỮ) - ĐÃ FIX
────────────────────────────────────────── */
@media (max-width:768px){
  .info-bar { 
    padding: 20px 20px 30px; 
    gap: 16px; 
    max-height: 65vh; 
  }
  .girl-name-big { font-size: clamp(20px, 5.5vw, 28px) !important; }
  .star-msg { font-size: 13px; line-height: 1.6; }
}

@media (max-width:640px){
  .info-bar { 
    flex-direction: column; 
    align-items: flex-start; 
    justify-content: flex-start; 
  }
  .star-left, .star-right { width: 100%; flex: none; max-width: 100%; }
  .star-right { text-align: left; margin-top: 12px; } 
  .divider { margin: 12px 0; margin-right: auto; }
  .coord-row { justify-content: flex-start; gap: 20px; margin-bottom: 3px; }
  .pw-card { padding: 36px 20px 32px; }
  .star-meaning { margin-bottom: 8px; font-size: 14px; }
}

.shooting-star{
  position:fixed; width:2px; height:2px; background:white; border-radius:50%;
  box-shadow:0 0 10px white,0 0 20px white; z-index:3; pointer-events:none;
}

#star-screen.show .girl-name-big{animation:vipFade 2.5s ease}
@keyframes vipFade{
  0%{opacity:0;transform:translateY(20px)}
  100%{opacity:1;transform:translateY(0)}
}

.milkyway-overlay{
  position:fixed; inset:0; pointer-events:none; z-index:1;
  background:
    radial-gradient(circle at 20% 40%, rgba(120,140,255,.06), transparent 30%),
    radial-gradient(circle at 70% 60%, rgba(255,180,220,.05), transparent 25%);
  mix-blend-mode:screen;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
/* ──────────────────────────────────────────
   THUẬT TOÁN ĐẾM ĐỘNG: NĂM, THÁNG, NGÀY CHÍNH XÁC
────────────────────────────────────────── */
function getDynamicAge(dobString) {
  const dob = new Date(dobString);
  const now = new Date();
  
  let years = now.getFullYear() - dob.getFullYear();
  let months = now.getMonth() - dob.getMonth();
  let days = now.getDate() - dob.getDate();

  // Nếu số ngày âm, mượn ngày của tháng trước
  if (days < 0) {
    const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
    days += prevMonth.getDate();
    months--;
  }
  
  // Nếu số tháng âm, mượn tháng của năm trước
  if (months < 0) {
    years--;
    months += 12;
  }

  let ageParts = [];
  if (years > 0) ageParts.push(years + " năm");
  if (months > 0) ageParts.push(months + " tháng");
  if (days > 0) ageParts.push(days + " ngày");
  
  return ageParts.length > 0 ? ageParts.join(" ") : "0 ngày";
}

function formatDOB(dobString) {
  const d = new Date(dobString);
  const day = ("0" + d.getDate()).slice(-2);
  const month = ("0" + (d.getMonth() + 1)).slice(-2);
  const year = d.getFullYear();
  return `${day}/${month}/${year}`;
}

/* ──────────────────────────────────────────
   STAR FIELD BACKGROUND (MÀN HÌNH KHÓA)
────────────────────────────────────────── */
(function(){
  const bg = document.getElementById('pw-bg');
  for(let i=0;i<180;i++){
    const s = document.createElement('div');
    s.className = 'sp';
    const sz = Math.random()*1.5+0.3;
    s.style.cssText =
      `width:${sz}px;height:${sz}px;`+
      `left:${Math.random()*100}%;top:${Math.random()*100}%;`+
      `--d:${3+Math.random()*5}s;`+
      `--dl:${Math.random()*5}s;`+
      `--a:${(.1+Math.random()*.4).toFixed(2)};`+
      `opacity:${.1+Math.random()*.4};`;
    bg.appendChild(s);
  }
})();

/* ──────────────────────────────────────────
   PASSWORD LOGIC
────────────────────────────────────────── */
const pwInp  = document.getElementById('pw-inp');
const pwBtn  = document.getElementById('pw-btn');
const pwErr  = document.getElementById('pw-err');
const pwCard = document.getElementById('pw-card');
const pwScr  = document.getElementById('pw-screen');

function tryUnlock(){
  if(pwInp.value.trim() === CFG.password){
    pwScr.classList.add('fade-out');
    setTimeout(()=>{ pwScr.style.display='none'; revealStar(); }, 1200);
  } else {
    pwErr.classList.add('show');
    pwCard.classList.remove('do-shake');
    void pwCard.offsetWidth;
    pwCard.classList.add('do-shake');
    pwInp.value = '';
    setTimeout(()=>pwErr.classList.remove('show'), 3000);
  }
}

pwBtn.addEventListener('click', tryUnlock);
pwInp.addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });

/* ──────────────────────────────────────────
   POPULATE DOM
────────────────────────────────────────── */
function revealStar(){
  document.getElementById('d-star-name').textContent = "✦ " + CFG.starName;
  document.getElementById('d-girl-name').textContent = CFG.girlName;
  document.getElementById('d-meaning').textContent   = CFG.starMeaning;
  document.getElementById('d-msg').textContent       = CFG.message;
  
  document.getElementById('d-dob').textContent       = formatDOB(CFG.girlDOB);
  document.getElementById('d-age').textContent       = getDynamicAge(CFG.girlDOB);

  document.getElementById('d-ra').textContent        = CFG.ra;
  document.getElementById('d-dec').textContent       = CFG.dec;
  document.getElementById('d-mag').textContent       = CFG.magnitude;
  document.getElementById('d-dist').textContent      = CFG.distance;
  document.getElementById('d-const').textContent     = CFG.constellation;
  document.getElementById('tag-const').textContent   = CFG.constellation;

  const ss = document.getElementById('star-screen');
  ss.style.display = 'block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>ss.classList.add('show')));
  initThree();
}

/* ──────────────────────────────────────────
   THREE.JS — CINEMATIC UNIVERSE (NO DUST)
────────────────────────────────────────── */
function initThree(){
  const COLORS = {
    rose: { core: '#FFFFFF', inner: '#FFE5EC', mid: '#FF8FAB', outer: '#FB6F92' }
  };
  const C = COLORS.rose;

  const canvas   = document.getElementById('canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x020308, 1);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, .1, 500);
  camera.position.set(0,0,22);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;      
  controls.dampingFactor = 0.05;
  controls.minDistance = 2.0;         
  controls.maxDistance = 40;          

  const mkTex = (fn, sz=256)=>{
    const c=document.createElement('canvas'); c.width=c.height=sz;
    fn(c.getContext('2d'), c.width);
    return new THREE.CanvasTexture(c);
  };

  const dotTex = (()=>{
    const c=document.createElement('canvas'); c.width=c.height=32;
    const x=c.getContext('2d');
    const g=x.createRadialGradient(16,16,0,16,16,16);
    g.addColorStop(0,  'rgba(255,255,255,1)');
    g.addColorStop(0.2,'rgba(255,235,245,0.8)');
    g.addColorStop(0.6,'rgba(255,160,190,0.2)');
    g.addColorStop(1,  'rgba(0,0,0,0)');
    x.fillStyle=g; x.fillRect(0,0,32,32);
    return new THREE.CanvasTexture(c);
  })();

  const STAR_COUNT = 25000;
  const starGeo = new THREE.BufferGeometry();
  const starPos = new Float32Array(STAR_COUNT * 3);
  const starCol = new Float32Array(STAR_COUNT * 3);
  
  const starTwinkleSpeeds = new Float32Array(STAR_COUNT);
  const starTwinkleOffsets = new Float32Array(STAR_COUNT);

  for(let i=0; i<STAR_COUNT; i++) {
    const r = 10 + Math.random() * 98; 
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);

    starPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    starPos[i*3+2] = r * Math.cos(phi);

    const mix = Math.random();
    if(mix > 0.75) {
      starCol[i*3]=1.0; starCol[i*3+1]=0.92; starCol[i*3+2]=0.8; 
    } else if (mix > 0.45) {
      starCol[i*3]=0.95; starCol[i*3+1]=0.85; starCol[i*3+2]=1.0; 
    } else {
      starCol[i*3]=0.85; starCol[i*3+1]=0.95; starCol[i*3+2]=1.0; 
    }

    starTwinkleSpeeds[i]  = 0.3 + Math.random() * 0.6;
    starTwinkleOffsets[i] = Math.random() * Math.PI * 2;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));

  const starMat = new THREE.PointsMaterial({
    map: dotTex, size: 0.22, vertexColors: true, transparent: true,
    opacity: 0.95, sizeAttenuation: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  const galaxyField = new THREE.Points(starGeo, starMat);
  scene.add(galaxyField);

  const createNebulaContainer = (colorString, scaleSize, posZ) => {
    const tex = mkTex((ctx,s)=>{
      const g=ctx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
      g.addColorStop(0, colorString);
      g.addColorStop(0.5, colorString.replace('0.22', '0.08').replace('0.18', '0.05'));
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.fillRect(0,0,s,s);
    }, 512);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
      map: tex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
    }));
    sprite.scale.set(scaleSize, scaleSize, 1);
    sprite.position.z = posZ;
    return sprite;
  };

  const nebulaPink = createNebulaContainer('rgba(74,21,75,0.22)', 25, -5);
  const nebulaBlue = createNebulaContainer('rgba(10,28,58,0.18)', 36, -8);
  scene.add(nebulaPink, nebulaBlue);

  const core = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 32, 32),
    new THREE.MeshBasicMaterial({ color: C.core })
  );
  scene.add(core);

  function glowSprite(color, size, opacity){
    const tex = mkTex((ctx,s)=>{
      const g=ctx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
      g.addColorStop(0,   'rgba(255,255,255,1)');
      g.addColorStop(0.2, color);
      g.addColorStop(0.6, color.replace('1)','0.2)').replace('0.8)','0.15)'));
      g.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.fillRect(0,0,s,s);
    }, 256);
    const mat = new THREE.SpriteMaterial({
      map: tex, transparent: true, opacity: opacity, blending: THREE.AdditiveBlending, depthWrite: false
    });
    const sp = new THREE.Sprite(mat);
    sp.scale.set(size, size, 1);
    return sp;
  }

  const g1 = glowSprite('rgba(255,229,236,1)', 1.4, 0.95);
  const g2 = glowSprite('rgba(255,143,171,0.8)', 3.2, 0.7);
  const g3 = glowSprite('rgba(251,111,146,0.4)', 7.0, 0.4);
  scene.add(g1, g2, g3);

  function raySprite(rot){
    const tex = mkTex((ctx,s)=>{
      ctx.clearRect(0,0,s,s);
      const g = ctx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
      g.addColorStop(0,  'rgba(255,255,255,1)');
      g.addColorStop(0.1,'rgba(255,143,171,0.6)');
      g.addColorStop(0.4,'rgba(251,111,146,0.08)');
      g.addColorStop(1,  'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.ellipse(s/2, s/2, s/2, 3, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(s/2, s/2, 3, s/2, 0, 0, Math.PI*2); ctx.fill();
    }, 512);
    const mat = new THREE.SpriteMaterial({
      map: tex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
    });
    const sp = new THREE.Sprite(mat);
    sp.material.rotation = rot;
    return sp;
  }

  const ray1 = raySprite(0);        ray1.scale.set(5.0, 5.0, 1);
  const ray2 = raySprite(Math.PI/4);ray2.scale.set(3.8, 3.8, 1);
  scene.add(ray1, ray2);

  let t=0, intro=0;
  let cinematic=true;

  function animate(){
    requestAnimationFrame(animate);
    t += 0.008;

    if(intro<1) intro = Math.min(1, intro + 0.008); 
    const eased = 1 - Math.pow(1 - intro, 3); 

    if(cinematic){
      camera.position.z -= 0.08;
      if(camera.position.z<=6){ camera.position.z=6; cinematic=false; }
    }else{
      controls.update();
    }
    
    const p1 = 0.97 + 0.03 * Math.sin(t * 1.1);
    const p2 = 0.94 + 0.06 * Math.sin(t * 0.7 + 0.8);
    const p3 = 0.90 + 0.10 * Math.sin(t * 0.5 + 1.6);

    core.scale.setScalar(eased * (1 + 0.025 * Math.sin(t * 1.3)));
    g1.scale.set(1.4 * p1 * eased, 1.4 * p1 * eased, 1);
    g2.scale.set(3.2 * p2 * eased, 3.2 * p2 * eased, 1);
    g3.scale.set(7.0 * p3 * eased, 7.0 * p3 * eased, 1);
    
    ray1.scale.set(5.0 * eased, 5.0 * eased, 1);
    ray2.scale.set(3.8 * eased, 3.8 * eased, 1);

    ray1.material.rotation = t * 0.04;
    ray2.material.rotation = -t * 0.025 + Math.PI / 4;
    ray1.material.opacity  = (0.75 + 0.10 * Math.sin(t * 1.8)) * eased;
    ray2.material.opacity  = (0.40 + 0.08 * Math.sin(t * 2.2)) * eased;

    const colorArr = starGeo.attributes.color.array;
    for(let i=0; i<STAR_COUNT; i++) {
      const factor = 0.75 + 0.25 * Math.sin(t * starTwinkleSpeeds[i] + starTwinkleOffsets[i]);
      colorArr[i*3]     = colorArr[i*3] * 0.97 + factor * 0.03; 
      colorArr[i*3+1]   = colorArr[i*3+1] * 0.97 + factor * 0.03;
      colorArr[i*3+2]   = colorArr[i*3+2] * 0.97 + factor * 0.03;
    }
    starGeo.attributes.color.needsUpdate = true;

    galaxyField.rotation.y = t * 0.0006;
    galaxyField.rotation.x = t * 0.0002;
    
    nebulaPink.scale.setScalar(25 + 0.3 * Math.sin(t * 0.2));
    nebulaBlue.scale.setScalar(36 + 0.4 * Math.cos(t * 0.15));

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });
}
</script>

<script>
/* VIP Shooting Stars */
setInterval(()=>{
 const s=document.createElement('div');
 s.className='shooting-star';
 s.style.left='-20px';
 s.style.top=(Math.random()*30)+'vh';
 document.body.appendChild(s);

 let x=-20,y=parseFloat(s.style.top);
 let id=setInterval(()=>{
   x+=16; y+=1.2;
   s.style.transform=`translate(${x}px,${y}px)`;
   if(x>window.innerWidth+200){ clearInterval(id); s.remove(); }
 },16);
},14000);
</script>
